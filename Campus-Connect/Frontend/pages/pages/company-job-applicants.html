<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicants | Campus Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #b37a0f; --dark: #3e2c0f; --bg: #f4f1eb; --white: #fff; --text: #4a3f35; --muted: #8b7d6b; --border: #e0d5c7; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { background: var(--white); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 100; }
    .nav-brand h2 { color: var(--gold); font-size: 18px; font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn-back { padding: 7px 18px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: 0.2s; text-decoration: none; }
    .btn-back:hover { border-color: var(--gold); color: var(--gold); }
    .btn-export { padding: 7px 18px; border-radius: 20px; border: none; background: #2e7d32; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-export:hover { background: #1b5e20; }
    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-size: 24px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .page-header p { font-size: 13px; color: var(--muted); }
    .section-card { background: var(--white); border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.07); overflow: hidden; }
    .section-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .section-header h3 { font-size: 15px; font-weight: 700; color: var(--text); }
    .section-meta { font-size: 12px; color: var(--muted); font-weight: 500; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--dark); color: white; padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 600; }
    td { padding: 12px 14px; font-size: 13px; color: var(--text); border-bottom: 1px solid #f5f0ea; vertical-align: top; }
    tr:hover td { background: #fdfaf7; }
    tr:last-child td { border-bottom: none; }
    .applicant-name { font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .applicant-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-pending  { background: #fff8e1; color: #f59e0b; }
    .badge-accepted { background: #e8f5e9; color: #2e7d32; }
    .badge-rejected { background: #ffebee; color: #c62828; }
    .btn-sm { padding: 5px 10px; border-radius: 10px; border: none; font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-right: 4px; margin-top: 2px; display: inline-block; }
    .btn-accept { background: #e8f5e9; color: #2e7d32; }
    .btn-accept:hover { background: #2e7d32; color: white; }
    .btn-reject { background: #ffebee; color: #c62828; }
    .btn-reject:hover { background: #c62828; color: white; }
    .btn-view   { background: #e3f2fd; color: #1565c0; }
    .btn-view:hover { background: #1565c0; color: white; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    footer { background: var(--dark); color: white; text-align: center; padding: 18px; font-size: 13px; margin-top: 40px; }
    @media (max-width: 768px) { nav { padding: 14px 16px; } .main { padding: 20px 16px; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand"><h2>🎓 Campus Connect</h2></div>
  <div class="nav-right">
    <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
    <a class="btn-back" href="company-dashboard.html">← Dashboard</a>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <h1>👥 Job Applicants</h1>
    <p id="jobTitleMeta">Loading job details...</p>
  </div>

  <div class="section-card">
    <div class="section-header">
      <h3 id="jobTitle">Applicants</h3>
      <span class="section-meta" id="applicantCount"></span>
    </div>
    <div class="table-wrap">
      <div id="applicantsList">
        <div class="loading">⏳ Loading applicants...</div>
      </div>
    </div>
  </div>
</div>

<footer>© 2026 Campus Connect | All Rights Reserved</footer>
<script src="../Js/company-job-applicants.js"></script>
</body>
</html>
