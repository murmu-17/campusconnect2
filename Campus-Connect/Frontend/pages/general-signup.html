<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>General Signup | Campus Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/general-signup.css">
  <style>
    .otp-row { display:flex; gap:8px; margin-top:8px; }
    .otp-row input { flex:1; padding:10px 14px; border:1.5px solid #e0d5c7; border-radius:10px; font-family:'Poppins',sans-serif; font-size:15px; letter-spacing:6px; text-align:center; outline:none; }
    .otp-row input:focus { border-color:#b37a0f; }
    .btn-otp-verify { padding:10px 18px; border-radius:10px; border:none; background:#3e2c0f; color:white; font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-otp-verify:hover { background:#b37a0f; }
    .btn-otp-verify:disabled { background:#ccc; cursor:not-allowed; }
    .btn-send-otp { padding:10px 16px; border-radius:10px; border:1.5px solid #b37a0f; background:transparent; color:#b37a0f; font-family:'Poppins',sans-serif; font-size:13px; font-weight:600; cursor:pointer; margin-top:6px; width:100%; transition:0.2s; }
    .btn-send-otp:hover { background:#b37a0f; color:white; }
    .btn-send-otp:disabled { border-color:#ccc; color:#ccc; cursor:not-allowed; background:transparent; }
    .otp-section { margin-top:10px; padding:14px; background:#fdfaf7; border-radius:12px; border:1.5px solid #e0d5c7; }
    .otp-status { font-size:12px; margin-top:6px; font-weight:600; }
  </style>
</head>
<body>

<div class="container">

  <div class="logo">
    <img src="../images/logo.png" alt="Campus Connect Logo" onerror="this.style.display='none'">
  </div>

  <h1>Create Account</h1>
  <p class="subtitle">Sign up with your Gmail address</p>

  <!-- EMAIL FORM ONLY -->
  <div id="panel-email">
    <form id="emailForm">
      <label>Full Name</label>
      <input type="text" id="g_name" placeholder="Your full name" required>

      <label>Gmail Address</label>
      <input type="email" id="g_email" placeholder="yourname@gmail.com" required>

      <!-- OTP Send -->
      <button type="button" class="btn-send-otp" id="send-otp-btn-email" onclick="sendOtp('email')">
        Send OTP to Email
      </button>
      <p class="otp-status" id="otp-status-email"></p>

      <!-- OTP Input (hidden until OTP sent) -->
      <div class="otp-section" id="otp-section-email" style="display:none;">
        <label style="font-size:13px;font-weight:600;color:#4a3f35;">Enter 6-digit OTP</label>
        <div class="otp-row">
          <input type="text" id="otp-input-email" maxlength="6" placeholder="------">
          <button type="button" class="btn-otp-verify" id="verify-otp-btn-email" onclick="verifyOtp('email')">Verify</button>
        </div>
      </div>

      <label style="margin-top:14px;">Password</label>
      <input type="password" id="g_password" placeholder="Minimum 8 characters" required minlength="8">

      <button type="submit" class="submit-btn" id="emailBtn">Create Account</button>
    </form>
  </div>

  <div class="divider"></div>
  <p class="login-link">Already have an account? <a href="login.html">Log in</a></p>
  <div class="back-link"><a href="signup.html">Back to Signup Options</a></div>

</div>

<script src="../Js/general-signup.js"></script>
</body>
</html>
