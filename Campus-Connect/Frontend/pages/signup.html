<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Campus Connect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="container">

        <div class="logo">
            <img src="../images/logo.png" alt="Campus Connect Logo">
        </div>

        <h1>Choose Sign Up Method</h1>
        <p class="subtitle">Click one option to continue</p>

        <div class="signup-option" onclick="window.location.href='verified-signup.html'">
            <div class="option-header">
                <div class="option-icon verified-icon">🎓</div>
                <div>
                    <span class="option-title">Verified Student</span>
                    <span class="verified-badge">✓ Verified</span>
                </div>
            </div>
            <div class="option-description">
                For IITs, NITs, IIITs, IISc students. Verify using institute email.
            </div>
        </div>

        <div class="signup-option" onclick="window.location.href='general-signup.html'">
            <div class="option-header">
                <div class="option-icon gmail-icon">📧</div>
                <div class="option-title">Sign Up with Gmail/Phone Number</div>
            </div>
            <div class="option-description">
                Quick signup using your Gmail account or phone number.
            </div>
        </div>

        <div class="back-link">
            <a href="../index.html">← Back to Home</a>
        </div>

    </div>
</body>
</html>
